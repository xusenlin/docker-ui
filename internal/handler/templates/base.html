<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Docker UI</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
    #detail-modal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 1000;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(4px);
    }
    #detail-modal.show { display: flex; }
    .modal-box {
        background: #fff;
        border-radius: 16px;
        width: 580px;
        max-width: 95vw;
        max-height: 85vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .modal-header {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid #f0f0f2;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
    }
    .modal-header h2 {
        font-size: 1rem;
        font-weight: 700;
        color: #1c1c1e;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    .modal-close {
        background: none;
        border: none;
        cursor: pointer;
        color: #8e8e93;
        font-size: 1.25rem;
        line-height: 1;
        padding: 0.25rem;
        border-radius: 6px;
        transition: all 0.15s;
    }
    .modal-close:hover { background: #f5f5f7; color: #1c1c1e; }
    .modal-body {
        padding: 1.25rem 1.5rem;
        overflow-y: auto;
        flex: 1;
    }
    .modal-loading {
        text-align: center;
        padding: 3rem;
        color: #8e8e93;
        font-size: 0.875rem;
    }
    .modal-loading::after {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #8e8e93;
        margin-left: 0.5rem;
        animation: pulse 1s infinite;
    }
    @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
    }
    .update-log {
        padding: 0;
    }
    .log-entry {
        display: flex;
        align-items: flex-start;
        gap: 0.625rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid #f0f0f2;
        font-size: 0.8125rem;
        line-height: 1.5;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-icon {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.625rem;
        font-weight: 700;
        flex-shrink: 0;
        margin-top: 1px;
    }
    .log-entry.pending .log-icon {
        background: #e5e5ea;
        color: #8e8e93;
    }
    .log-entry.running .log-icon {
        background: #007aff;
        color: #fff;
        animation: pulse 1s infinite;
    }
    .log-entry.success .log-icon {
        background: #34c759;
        color: #fff;
    }
    .log-entry.error .log-icon {
        background: #ff3b30;
        color: #fff;
    }
    .log-content {
        flex: 1;
        min-width: 0;
    }
    .log-title {
        color: #1c1c1e;
        font-weight: 500;
    }
    .log-detail {
        color: #8e8e93;
        font-size: 0.75rem;
        margin-top: 2px;
        word-break: break-all;
    }
    .log-entry.error .log-title { color: #ff3b30; }
    .log-entry.error .log-detail { color: #ff3b30; opacity: 0.8; }
    .update-result {
        margin-top: 1rem;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.8125rem;
        font-weight: 500;
    }
    .update-result.success {
        background: #e8f9ed;
        color: #1a7f37;
    }
    .update-result.error {
        background: #ffebeb;
        color: #cf222e;
    }
    .self-notice {
        padding: 0.75rem 1rem;
        background: #fff8e1;
        border-radius: 8px;
        font-size: 0.8125rem;
        color: #91671c;
        line-height: 1.5;
    }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Docker UI</div>
        <div class="nav-links">
            <a href="/containers" {{if eq .CurrentPage "containers"}}class="active"{{end}}>Containers</a>
            <a href="/images" {{if eq .CurrentPage "images"}}class="active"{{end}}>Images</a>
        </div>
    </nav>
    <main>
        <div class="page-header">
            <h1>{{.Title}}</h1>
            {{if .Count}}<span class="page-count">{{.Count}} items</span>{{end}}
        </div>
        {{.Content}}
    </main>

    <div id="detail-modal">
        <div class="modal-box">
            <div class="modal-header">
                <h2><span id="modal-name"></span> <span id="modal-state" class="badge"></span></h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modal-body">
                <div class="modal-loading">Loading</div>
            </div>
        </div>
    </div>

    <script>
    const modal = document.getElementById('detail-modal');
    const modalBody = document.getElementById('modal-body');
    const modalName = document.getElementById('modal-name');
    const modalState = document.getElementById('modal-state');

    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
    });

    function closeModal() {
        modal.classList.remove('show');
    }

    function esc(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function h(s) {
        return s == null ? '-' : esc(s);
    }

    function containerAction(id, action, btn) {
        btn.disabled = true;
        btn.textContent = '...';
        fetch('/containers/' + id + '/' + action, {
            method: 'POST',
            credentials: 'include'
        }).then(r => {
            if (r.ok) {
                location.reload();
            } else {
                r.text().then(t => { alert('Action failed: ' + t); btn.disabled = false; btn.textContent = btn.dataset.label; });
            }
        }).catch(err => { alert('Error: ' + err.message); btn.disabled = false; btn.textContent = btn.dataset.label; });
    }

    function updateContainer(id) {
        modal.classList.add('show');
        modalName.textContent = 'Updating Container';
        modalState.className = 'badge badge-running';
        modalState.textContent = 'Updating';
        modalBody.innerHTML = '<div class="update-log" id="update-log"></div>';

        const log = document.getElementById('update-log');
        let entryCount = 0;

        const addEntry = (title, state, detail) => {
            const icons = { pending: '', running: '...', success: '✓', error: '✗' };
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + state;
            entry.innerHTML = '<div class="log-icon">' + icons[state] + '</div>' +
                '<div class="log-content"><div class="log-title">' + esc(title) + '</div>' +
                (detail ? '<div class="log-detail">' + esc(detail) + '</div>' : '') + '</div>';
            log.appendChild(entry);
            entryCount++;
            modalBody.scrollTop = modalBody.scrollHeight;
            return entry;
        };

        const setResult = (success, message) => {
            const div = document.createElement('div');
            div.className = 'update-result ' + (success ? 'success' : 'error');
            div.textContent = message;
            log.appendChild(div);
            modalState.className = 'badge badge-' + (success ? 'running' : 'exited');
            modalState.textContent = success ? 'Done' : 'Failed';
        };

        addEntry('Getting container details...', 'running');

        fetch('/containers/' + id + '/update', {
            method: 'GET',
            credentials: 'include'
        }).then(async r => {
            if (!r.ok) {
                const t = await r.text();
                log.lastElementChild.className = 'log-entry error';
                log.lastElementChild.querySelector('.log-icon').textContent = '✗';
                setResult(false, t);
                return;
            }
            const reader = r.body.getReader();
            const decoder = new TextDecoder();
            let dataBuffer = '';
            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                dataBuffer += decoder.decode(value, {stream: true});
                let lines = dataBuffer.split('\n');
                dataBuffer = lines.pop();
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    if (line === 'event: error' && lines[i + 1]) {
                        const errMsg = lines[i + 1].startsWith('data: ') ? lines[i + 1].slice(6) : lines[i + 1];
                        log.lastElementChild.className = 'log-entry error';
                        log.lastElementChild.querySelector('.log-icon').textContent = '✗';
                        log.lastElementChild.querySelector('.log-title').textContent = 'Error';
                        if (errMsg) {
                            const detail = log.lastElementChild.querySelector('.log-detail');
                            if (detail) { detail.textContent = errMsg; }
                            else { log.lastElementChild.querySelector('.log-content').insertAdjacentHTML('beforeend', '<div class="log-detail">' + esc(errMsg) + '</div>'); }
                        }
                        setResult(false, 'Update failed');
                        return;
                    }
                    if (line === 'event: progress' && lines[i + 1] && lines[i + 1].startsWith('data: ')) {
                        try {
                            const data = JSON.parse(lines[i + 1].slice(6));
                            if (data.status === 'done') {
                                const lastEntry = log.lastElementChild;
                                if (lastEntry && lastEntry.classList.contains('running')) {
                                    lastEntry.className = 'log-entry success';
                                    lastEntry.querySelector('.log-icon').textContent = '✓';
                                }
                                if (data.message !== id) {
                                    addEntry('Container recreated (ID: ' + data.message + ')', 'success');
                                    setResult(true, 'Update completed successfully');
                                } else {
                                    setResult(true, 'Image is already up to date');
                                }
                            } else if (data.status === 'up-to-date') {
                                const lastEntry = log.lastElementChild;
                                if (lastEntry && lastEntry.classList.contains('running')) {
                                    lastEntry.className = 'log-entry success';
                                    lastEntry.querySelector('.log-icon').textContent = '✓';
                                }
                                addEntry(data.message, 'success');
                            } else if (data.status === 'pulling') {
                                const lastEntry = log.lastElementChild;
                                if (lastEntry && lastEntry.classList.contains('running') && lastEntry.dataset.pull) {
                                    const detail = lastEntry.querySelector('.log-detail');
                                    if (detail) { detail.textContent = data.message; }
                                    else { lastEntry.querySelector('.log-content').insertAdjacentHTML('beforeend', '<div class="log-detail">' + esc(data.message) + '</div>'); }
                                } else {
                                    if (lastEntry && lastEntry.classList.contains('running')) {
                                        lastEntry.className = 'log-entry success';
                                        lastEntry.querySelector('.log-icon').textContent = '✓';
                                    }
                                    const entry = addEntry('Pulling latest image...', 'running', data.message);
                                    entry.dataset.pull = '1';
                                }
                            } else {
                                const lastEntry = log.lastElementChild;
                                if (lastEntry && lastEntry.classList.contains('running')) {
                                    lastEntry.className = 'log-entry success';
                                    lastEntry.querySelector('.log-icon').textContent = '✓';
                                }
                                addEntry(data.message, 'running');
                            }
                        } catch (e) {}
                        i++;
                    }
                }
            }
        }).catch(err => {
            const lastEntry = log.lastElementChild;
            if (lastEntry && lastEntry.classList.contains('running')) {
                lastEntry.className = 'log-entry error';
                lastEntry.querySelector('.log-icon').textContent = '✗';
            }
            setResult(false, err.message);
        });
    }

    function showContainerDetail(id) {
        modal.classList.add('show');
        modalName.textContent = id;
        modalState.className = 'badge';
        modalState.textContent = '';
        modalBody.innerHTML = '<div class="modal-loading">Loading</div>';

        fetch('/containers/' + id, { credentials: 'include' })
            .then(r => r.json())
            .then(d => {
                modalName.textContent = d.name || id;
                modalState.className = 'badge badge-' + (d.state || 'created');
                modalState.textContent = d.state || '';

                let html = '<div class="detail-grid">';

                const rows = [
                    ['ID', d.id],
                    ['Image', d.image],
                    ['Status', d.status],
                    ['Created', d.created],
                    ['Command', d.cmd],
                    ['Restart', d.restart_policy],
                    ['Memory', d.memory],
                    ['CPU Quota', d.cpu_quota],
                ];
                for (const [label, val] of rows) {
                    if (val && val !== '-') {
                        html += '<div class="detail-row"><span class="detail-label">'+label+'</span><span class="detail-value mono">'+h(val)+'</span></div>';
                    }
                }

                if (d.ports && d.ports.length > 0) {
                    const ports = d.ports.map(p => '<span class="port-tag">'+esc(p.HostPort)+' → '+esc(p.ContainerPort)+'</span>').join('');
                    html += '<div class="detail-row"><span class="detail-label">Ports</span><span class="detail-value">'+ports+'</span></div>';
                }

                if (d.networks && d.networks.length > 0) {
                    const nets = d.networks.map(n => '<span class="tag">'+esc(n)+'</span>').join('');
                    html += '<div class="detail-row"><span class="detail-label">Networks</span><span class="detail-value">'+nets+'</span></div>';
                }

                if (d.mounts && d.mounts.length > 0) {
                    const mounts = d.mounts.map(m => {
                        let mode = m.Mode ? '<span class="mount-mode">'+esc(m.Mode)+'</span>' : '';
                        return '<div class="mount-item"><span class="mount-type">'+esc(m.Type)+'</span><span class="mount-src">'+esc(m.Source)+'</span><span class="mount-arrow">→</span><span class="mount-dst">'+esc(m.Destination)+'</span>'+mode+'</div>';
                    }).join('');
                    html += '<div class="detail-section"><div class="detail-label">Mounts</div><div class="mount-list">'+mounts+'</div></div>';
                }

                if (d.env_vars && d.env_vars.length > 0) {
                    const envs = d.env_vars.map(e => '<div class="env-item"><span class="env-key">'+esc(e.Key)+'</span><span class="env-value">'+esc(e.Value)+'</span></div>').join('');
                    html += '<div class="detail-section"><div class="detail-label">Env</div><div class="env-list">'+envs+'</div></div>';
                }

                html += '</div>';

                if (d.is_self) {
                    html += '<div class="detail-actions"><div class="self-notice">This is the Docker UI container itself. Updating it here would stop the service. Please update manually via docker CLI.</div></div>';
                } else {
                    html += '<div class="detail-actions"><button class="btn btn-primary" onclick="updateContainer(\'' + d.id + '\')">Update Image & Recreate</button></div>';
                }

                modalBody.innerHTML = html;
            })
            .catch(err => {
                modalBody.innerHTML = '<div class="empty">Failed to load: ' + esc(err.message) + '</div>';
            });
    }
    </script>
</body>
</html>
